services:
  rh-testdb:
    image: mysql:8.0
    container_name: rh-testdb-mysql
    restart: unless-stopped
    environment:
      MYSQL_ROOT_PASSWORD: ${RH_TESTDB_MYSQL_ROOT_PASSWORD}
      MYSQL_DATABASE: ${RH_TESTDB_MYSQL_DATABASE}
      MYSQL_USER: ${RH_TESTDB_MYSQL_USER}
      MYSQL_PASSWORD: ${RH_TESTDB_MYSQL_PASSWORD}
      TZ: ${TZ}
    volumes:
      - rh_testdb_data:/var/lib/mysql
      - ./rh-testdb/init:/docker-entrypoint-initdb.d:ro
      - ./rh-testdb/config/custom.cnf:/etc/mysql/conf.d/custom.cnf:ro
    ports:
      - "3307:3306"
    networks:
      - mysql-network
    healthcheck:
      test: ["CMD", "mysqladmin", "ping", "-h", "localhost", "-u", "root", "-p${RH_TESTDB_MYSQL_ROOT_PASSWORD}"]
      interval: 10s
      timeout: 5s
      retries: 5
      start_period: 60s
    command: --default-authentication-plugin=mysql_native_password --character-set-server=utf8mb4 --collation-server=utf8mb4_unicode_ci

networks:
  mysql-network:
    driver: bridge

volumes:
  rh_testdb_data:
    driver: local
